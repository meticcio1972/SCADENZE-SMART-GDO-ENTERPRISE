<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Scadenze Smart GDO</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<header class="table-header">

    <h1 id="titoloPagina">Scadenze</h1>

    <button class="btn-back"
            onclick="window.location.href='index.html'">
        ⬅ Dashboard
    </button>

</header>

<section class="table-area">

    <input
        type="text"
        id="ricerca"
        placeholder="🔍 Cerca prodotto..."
    >

    <table>

        <thead>

            <tr>

             <tr>
    <th>Codice</th>
    <th>Descrizione</th>
    <th>Reparto</th>
    <th>Scadenza</th>
    <th>Giorni</th>
    <th>Azioni</th>
</tr>

        </thead>

        <tbody id="tabellaScadenze">

        </tbody>

    </table>

<div id="productModal" class="modal">

    <div class="modal-content">

        <h2>Modifica prodotto</h2>

        <input id="codice" placeholder="Codice">
        <input id="descrizione" placeholder="Descrizione">
        <input id="categoria" placeholder="Reparto">

        <input id="scadenza" type="date">

        <input id="quantita" placeholder="Quantità">
        <input id="prezzo" placeholder="Prezzo">
        <textarea id="note" placeholder="Note"></textarea>

        <div class="modal-buttons">

            <button id="saveProduct">Salva</button>

            <button id="closeModal">Chiudi</button>

        </div>

    </div>

</div>
    
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="supabase.js"></script>
<script src="prodotti.js"></script>
<script src="storage.js"></script>
<script src="database.js"></script>
<script src="dashboard.js"></script>
<script src="app.js"></script>
    
<script src="scadenze.js"></script>

</body>

</html>
